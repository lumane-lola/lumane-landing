<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — Lumane Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/pricing.jsx"></script>
<script type="text/babel" src="components/trust.jsx"></script>

<script type="text/babel">
function AboutHero() {
  return (
    <section style={{ padding: '60px 0 80px' }}>
      <div className="wrap">
        <div style={{ position: 'relative', borderRadius: 14, overflow: 'visible' }}>
          {/* Editorial photo */}
          <div style={{
            position: 'relative',
            borderRadius: 14,
            overflow: 'hidden',
            aspectRatio: '21 / 9',
            minHeight: 420,
            background: 'linear-gradient(135deg, #d4c5b0 0%, #b8a890 50%, #8a7560 100%)',
          }}>
            <Photo
              tone="warm-1"
              src="assets/about-exhale.png?v=2"
              label="EDITORIAL · Together, finally at rest"
              shot="A Latina woman (50s) and her mother (late 70s) on a sunlit garden porch. The daughter leaning her head against her mother's shoulder, eyes closed, a small smile. The mother looking down at her daughter with quiet affection. Worn bench, terracotta cardigan, herb pots, late-morning light. Unposed, mid-moment."
              style={{ width: '100%', height: '100%', position: 'absolute', inset: 0 }}
            />
            <div style={{
              position: 'absolute', inset: 0,
              background: 'linear-gradient(180deg, rgba(20,16,12,0) 65%, rgba(20,16,12,0.35) 100%)',
              pointerEvents: 'none',
            }} />
          </div>

          {/* Overlapping callout card */}
          <div style={{
            position: 'relative',
            marginTop: -120,
            marginLeft: 48,
            marginRight: 48,
            padding: '44px 52px',
            background: 'var(--sand)',
            border: '1px solid var(--tan)',
            borderRadius: 14,
            boxShadow: '0 24px 60px -20px rgba(20,16,12,0.25)',
          }}>
            <div className="mono" style={{ marginBottom: 18, color: 'var(--teal-deep)', fontSize: 18 }}>About Lumane</div>
            <h1 className="h-display" style={{ fontSize: 'clamp(34px, 4.2vw, 54px)', lineHeight: 1.08, maxWidth: '20ch' }}>
              We're building the unified clinical record for American healthcare.
            </h1>
            <p className="lede" style={{ marginTop: 24, maxWidth: '52ch' }}>
              Starting with the family caregivers and skilled nursing facilities who need it most.
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Header />
      <main>
        <AboutHero />
        <TrustSection />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
