<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumane Health — the unified clinical record</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/pillars.jsx"></script>
<script type="text/babel" src="components/pricing.jsx"></script>
<script type="text/babel" src="components/trust.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <>
      <Header />
      <main>
        <Hero />

        <Pillar
          header={<>Records don&rsquo;t always match across providers. We catch the mismatches.</>}
          body={<p>A discontinued medication still listed in one system. A new diagnosis another provider hasn&rsquo;t seen. We catch the mismatches, show you what each chart says, and let you decide what&rsquo;s true.</p>}
          visual={<ReconciliationVisual />}
          reverse
        />

        <Pillar
          header="Walk into every appointment knowing what to ask."
          body={<p>Before each visit, generate a one-page summary: reconciled medications, recent labs, conditions across all their doctors, and the questions you want to remember to ask. Hand it to the nurse, or send it ahead.</p>}
          visual={<ReadinessVisual />}
        />

        {/*
          ─────────────────────────────────────────────────────────────────
          PRICING SECTION — TEMPORARILY REMOVED (restore later)
          ─────────────────────────────────────────────────────────────────
          The <PricingSection /> block was rendered here, just below the
          two Pillar sections and immediately above the Footer. It is the
          full-width pricing module defined in components/pricing.jsx
          (function PricingSection), and contained:

            • Left column: H1 "Try Lumane free, then keep it for less than
              a co-pay." plus supporting body copy about the 30-day trial
              and cancel-anytime policy.
            • Right column: a single elevated plan card on var(--card) with
              a 1px var(--tan) border and soft shadow, containing —
                – Headline price: "$0 for the first 30 days"
                – Sub: "For 1 parent and unlimited caregivers. No charge
                  until day 31."
                – "EVERYTHING INCLUDED" feature grid (2 cols, Check icons):
                  1 parent / unlimited caregivers, unlimited connected
                  providers, reconciled medications, pre-visit briefs.
                – "THEN, AFTER YOUR TRIAL" billing toggle with two
                  <BillingOption> radio cards: Monthly $14/mo and Annual
                  $99/yr (with a teal "SAVE 41%" badge, default selected).
                – Primary CTA "Start free trial →" linking to signup.html.

          Why removed: temporarily hidden from the landing page per
          stakeholder request; pricing copy/positioning is being revisited.
          The component, its helpers (BillingOption, Check), and its
          script tag in <head> all remain intact so this can be restored
          by simply uncommenting the line below. No spacing fix is needed
          here — the Footer's own top padding handles the gap, and the
          last <Pillar> already has its standard bottom rhythm.
          ─────────────────────────────────────────────────────────────────
        */}
        {/* <PricingSection /> */}
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
