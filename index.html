<!DOCTYPE html>

<script type="text/babel">
function FacilitiesHero() {

            letterSpacing: '-0.022em',

          <p className="body" style={{ fontSize: 18, maxWidth: '60ch', marginBottom: 32 }}>

          <div style={{ display: 'flex', alignItems: 'center', gap: 22, flexWrap: 'wrap' }}>

              onClick={(e) => {

              }}

              See how it works

          </div>
        </div>

        <div style={{
          position: 'relative',
          borderRadius: 14,
          overflow: 'hidden',

        }}>
          <Photo
            tone="warm-1"

            shot=""
            style={{ width: '100%', height: '100%', position: 'absolute', inset: 0 }}

// ─── The Problem ──────────────────────────────────────────
function ProblemSection() {

            <h2 className="h-1" style={{ marginBottom: 22 }}>

            </h2>
            <p className="body">
              When a patient walks into your facility, you receive a discharge summary from the hospital &mdash; and not much else. Your staff is tasked with manually chasing down the rest of the patient&rsquo;s records. <span style={{ color: 'var(--teal-deep)' }}>Missing data leads to readmissions, denied claims and CMS penalties.</span>
            </p>
          </div>

          <div>
            {/* Stats card */}
            <div style={{

              border: '1px solid var(--tan)',

              gridTemplateColumns: '1fr 1fr',

                  fontFamily: 'Lora, serif',
                  fontSize: 56,
                  fontWeight: 500,

                  marginBottom: 14,

              </div>
              <div>
                <div style={{
                  fontFamily: 'Lora, serif',
                  fontSize: 56,
                  fontWeight: 500,
                  color: 'var(--teal-deep)',
                  letterSpacing: '-0.02em',
                  lineHeight: 1,
                  marginBottom: 14,

                <div className="body" style={{ fontSize: 14, lineHeight: 1.5, paddingRight: 32 }}>

              </div>
            </div>

              background: 'var(--card)',
              border: '1px solid var(--tan)',
              borderTop: 'none',
              borderRadius: '0 0 14px 14px',
              padding: '32px 36px',
              boxShadow: '0 24px 48px -28px rgba(33, 38, 47, 0.2)',

              <h3 className="font-display" style={{
                fontSize: 22,
                letterSpacing: '-0.012em',
                color: 'var(--ink)',
                marginBottom: 22,
              }}>

                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                rowGap: 18,

                    gap: 14,

                    <span style={{
                      color: 'var(--teal)',
                      display: 'inline-flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      width: 40, height: 40,
                      borderRadius: 10,
                      background: 'var(--teal-soft)',
                      flexShrink: 0,

                      <i className={`ph-duotone ${item.icon}`} style={{ fontSize: 22, color: 'var(--teal-deep)' }}></i>
                    </span>
                    <span style={{
                      fontFamily: 'Lora, serif',
                      fontSize: 17,
                      fontWeight: 500,
                      letterSpacing: '-0.01em',
                      color: 'var(--ink)',
                      lineHeight: 1.25,
                    }}>{item.title}</span>
                  </div>

              </div>
            </div>
          </div>
        </div>
      </div>

// ─── How Lumane Closes the Gap ────────────────────────────

        </div>

        <iframe

          style={{

            display: 'block',
            background: 'transparent',

        <p className="body solution-result" style={{
          fontSize: 18,
          marginTop: -28,
          color: 'var(--ink)',
          fontWeight: 500,
        }}>
          <strong style={{ fontWeight: 600, color: 'var(--teal-deep)' }}>The result:</strong> Complete records on day one. Better outcomes, fewer denials, no fax queue.
        </p>
      </div>
    </section>
  );
}

// ─── Who Lumane Is ────────────────────────────────────────
function WhoSection() {
  return (
    <section style={{ padding: '90px 0', background: 'var(--sand)' }}>
      <div className="wrap">
        <div style={{ maxWidth: 880 }}>
          <div className="mono" style={{ color: 'var(--teal-deep)', marginBottom: 18 }}>◦ &nbsp; Who Lumane is</div>

      <div className="wrap">
        <div style={{ maxWidth: 720, marginBottom: 56 }}>

}

    {
      n: '02',
      title: 'Clean Handoff Packet',

    },
    {
      n: '03',
      title: 'Daily Patient Update Briefing',

              <div style={{
                fontFamily: 'Lora, serif',

                color: 'var(--teal)',

  ];
  return (
    <section style={{ padding: '110px 0' }}>
      <div className="wrap">
        <div style={{
          display: 'grid',
