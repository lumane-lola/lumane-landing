<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For facilities — Lumane Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/pricing.jsx"></script>
<script type="text/babel" src="components/trust.jsx"></script>

<script type="text/babel">
function FacilitiesHero() {
  return (
    <section style={{ padding: '60px 0 80px' }}>
      <div className="wrap">
        <div style={{ position: 'relative', borderRadius: 14, overflow: 'visible' }}>
          {/* Editorial photo background */}
          <div style={{
            position: 'relative',
            borderRadius: 14,
            overflow: 'hidden',
            aspectRatio: '21 / 9',
            minHeight: 420,
            background: 'linear-gradient(135deg, #d4c5b0 0%, #b8a890 50%, #8a7560 100%)',
          }}>
            <Photo
              tone="warm-1"
              src="assets/care-facility.png"
              label="EDITORIAL · Care aide reviewing tablet with resident"
              shot="Nurse / care aide kneeling beside an older man in a wheelchair, sharing a tablet in a sunlit common room. Late-morning window light from the left. Bookshelves and houseplants in the background. Unposed, mid-conversation."
              style={{ width: '100%', height: '100%', position: 'absolute', inset: 0 }}
            />
            {/* Subtle warm gradient for legibility */}
            <div style={{
              position: 'absolute', inset: 0,
              background: 'linear-gradient(90deg, rgba(20,16,12,0.55) 0%, rgba(20,16,12,0.25) 55%, rgba(20,16,12,0) 100%)',
              pointerEvents: 'none',
            }} />
          </div>

          {/* Callout card — overlapping bottom of photo */}
          <div style={{
            position: 'relative',
            marginTop: -120,
            marginLeft: 48,
            marginRight: 48,
            padding: '40px 48px',
            background: 'var(--sand)',
            border: '1px solid var(--tan)',
            borderRadius: 14,
            boxShadow: '0 24px 60px -20px rgba(20,16,12,0.25)',
            display: 'grid',
            gridTemplateColumns: '1.4fr 1fr',
            gap: 40,
            alignItems: 'center',
          }}>
            <div>
              <div className="mono" style={{ marginBottom: 14, color: 'var(--teal-deep)' }}>◦ &nbsp; For facilities &amp; care teams</div>
              <h1 className="font-display" style={{ fontSize: 30, lineHeight: 1.18, marginBottom: 14, maxWidth: '32ch' }}>
                Stop chasing records. Start admitting residents.
              </h1>
              <p className="body" style={{ fontSize: 14.5, maxWidth: '52ch' }}>
                Skilled nursing, assisted living, and home health teams use Lumane to assemble a complete medication list, conditions list, and clinical history at admission — in 10 minutes instead of 90. With source attribution your staff can defend in any audit.
              </p>
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
              <a href="/facility-demo.html" className="btn btn-primary">Book a 15-min demo</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <Header />
      <main style={{ paddingTop: 20 }}>
        <FacilitiesHero />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
